<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="DNA concept art for PharmaGenomics Advisor thumbnail">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1f3d"/>
      <stop offset="50%" stop-color="#123f54"/>
      <stop offset="100%" stop-color="#1e674d"/>
    </linearGradient>
    <linearGradient id="strandA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#72e3ff"/>
      <stop offset="100%" stop-color="#8fffa3"/>
    </linearGradient>
    <linearGradient id="strandB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3ff7b"/>
      <stop offset="100%" stop-color="#ff9bb8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 70px 'Segoe UI', sans-serif; letter-spacing: 1px; fill: #f5fbff; }
      .subtitle { font: 500 28px 'Segoe UI', sans-serif; fill: #dcecff; }
      .chip { fill: rgba(255,255,255,0.12); stroke: rgba(255,255,255,0.35); stroke-width: 1.2; rx: 12; }
      .chipText { font: 600 20px 'Segoe UI', sans-serif; fill: #f8ffff; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bgGrad)"/>

  <g opacity="0.18">
    <circle cx="140" cy="120" r="5" fill="#ffffff"/>
    <circle cx="220" cy="220" r="4" fill="#d7f6ff"/>
    <circle cx="1120" cy="90" r="5" fill="#ffffff"/>
    <circle cx="980" cy="650" r="4" fill="#d7f6ff"/>
    <circle cx="310" cy="620" r="5" fill="#ffffff"/>
  </g>

  <g transform="translate(150,70)" filter="url(#glow)">
    <path d="M120,0 C300,80 300,180 120,260 C-60,340 -60,440 120,520" fill="none" stroke="url(#strandA)" stroke-width="14" stroke-linecap="round"/>
    <path d="M240,0 C60,80 60,180 240,260 C420,340 420,440 240,520" fill="none" stroke="url(#strandB)" stroke-width="14" stroke-linecap="round"/>

    <g stroke="#e7fbff" stroke-width="6" opacity="0.85">
      <line x1="146" y1="38" x2="214" y2="38"/>
      <line x1="128" y1="92" x2="232" y2="92"/>
      <line x1="121" y1="146" x2="239" y2="146"/>
      <line x1="132" y1="200" x2="228" y2="200"/>
      <line x1="156" y1="254" x2="204" y2="254"/>
      <line x1="204" y1="308" x2="156" y2="308"/>
      <line x1="228" y1="362" x2="132" y2="362"/>
      <line x1="239" y1="416" x2="121" y2="416"/>
      <line x1="232" y1="470" x2="128" y2="470"/>
    </g>
  </g>

  <text x="560" y="230" class="title">PharmaGenomics Advisor</text>
  <text x="560" y="278" class="subtitle">AI Agents for Precision Medicine</text>

  <rect class="chip" x="560" y="340" width="240" height="54"/>
  <text x="585" y="374" class="chipText">Local + ADK Runtime</text>

  <rect class="chip" x="820" y="340" width="170" height="54"/>
  <text x="846" y="374" class="chipText">MCP Servers</text>

  <rect class="chip" x="560" y="412" width="215" height="54"/>
  <text x="586" y="446" class="chipText">Security Guardrails</text>

  <rect class="chip" x="790" y="412" width="240" height="54"/>
  <text x="816" y="446" class="chipText">Clinical Report Output</text>

  <text x="560" y="530" class="subtitle">From VCF Variants to Actionable Recommendations</text>
</svg>
